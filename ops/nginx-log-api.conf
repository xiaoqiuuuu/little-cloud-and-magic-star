# Add these locations to the feiyinluguo.cn server block before the generic
# location ^~ / reverse proxy managed by BaoTa.

location = /__ops/logs {
    proxy_pass http://127.0.0.1:8110/logs;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Log-API-Key $http_x_log_api_key;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_connect_timeout 5s;
    proxy_read_timeout 15s;
    proxy_send_timeout 15s;
    add_header Cache-Control "no-store" always;
}

location = /__ops/logs/health {
    proxy_pass http://127.0.0.1:8110/health;
    proxy_set_header Host $host;
    proxy_connect_timeout 5s;
    proxy_read_timeout 5s;
}

location ^~ /__ops/logs/ {
    return 404;
}
